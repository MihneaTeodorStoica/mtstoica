<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mihnea-Teodor Stoica</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #11111b;
      color: #cdd6f4;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 15px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::selection {
      background: rgba(180, 190, 254, 0.2);
      color: #cdd6f4;
    }

    :root {
      --panel-bg: #1a1a24;
      --panel-border: #1e1e28;
      --panel-radius: 8px;
    }

    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 96px 24px 140px;
    }

    header {
      margin-bottom: 80px;
      display: grid;
      grid-template-columns: minmax(240px, 320px) minmax(0, 1fr);
      gap: 28px 40px;
      align-items: start;
    }

    header .title {
      min-width: 0;
      padding-top: 6px;
    }

    header h1 {
      color: #cdd6f4;
      font-size: clamp(1.75rem, 1.3rem + 1vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
      line-height: 1.1;
      text-wrap: balance;
    }

    header .fortune {
      min-width: 0;
      width: min(100%, 34rem);
      justify-self: start;
      position: relative;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 38%),
        var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--panel-radius);
      padding: 14px 54px 14px 14px;
      font-size: clamp(0.58rem, 0.48rem + 0.5vw, 0.76rem);
      line-height: 1.45;
      color: #a6adc8;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
      overflow: hidden;
    }

    header .fortune.loading {
      color: #6c7086;
    }

    .fortune-content {
      display: block;
      white-space: pre;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      scrollbar-color: #45475a transparent;
      max-width: 100%;
      min-height: 7.2em;
      padding-bottom: 2px;
    }

    .fortune-content::-webkit-scrollbar {
      height: 8px;
    }

    .fortune-content::-webkit-scrollbar-thumb {
      background: #313244;
      border-radius: 999px;
    }

    .fortune-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .fortune-refresh {
      appearance: none;
      position: absolute;
      top: 10px;
      right: 10px;
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #313244;
      background: rgba(24, 24, 37, 0.92);
      color: #a6adc8;
      border-radius: 6px;
      padding: 0;
      font: inherit;
      line-height: 1;
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
    }

    .fortune-refresh svg {
      width: 15px;
      height: 15px;
      display: block;
    }

    .fortune-refresh:hover:not(:disabled) {
      border-color: #89b4fa;
      color: #cdd6f4;
      background: #1e1e2e;
    }

    .fortune-refresh:disabled {
      cursor: wait;
      color: #6c7086;
      border-color: #1e1e28;
      background: #161620;
    }

    header p {
      color: #a6adc8;
      font-size: 0.9rem;
      letter-spacing: 0.01em;
      max-width: 28ch;
    }

    section {
      margin-bottom: 56px;
      animation: fadeUp 0.5s ease both;
    }

    section:nth-child(2) { animation-delay: 0.05s; }
    section:nth-child(3) { animation-delay: 0.1s; }
    section:nth-child(4) { animation-delay: 0.15s; }
    section:nth-child(5) { animation-delay: 0.2s; }
    section:nth-child(6) { animation-delay: 0.25s; }
    section:nth-child(7) { animation-delay: 0.3s; }
    section:nth-child(8) { animation-delay: 0.35s; }
    section:nth-child(9) { animation-delay: 0.4s; }
    section:nth-child(10) { animation-delay: 0.45s; }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    section h2 {
      color: #6c7086;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #1e1e28;
    }

    section p {
      margin-bottom: 10px;
    }

    section ul {
      list-style: none;
      padding: 0;
    }

    section ul li {
      padding-left: 20px;
      position: relative;
      margin-bottom: 8px;
    }

    section ul li::before {
      content: "";
      position: absolute;
      left: 2px;
      top: 11px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #45475a;
    }

    .item {
      margin-bottom: 28px;
      padding-left: 14px;
      border-left: 2px solid #1e1e28;
      transition: border-color 0.3s ease;
    }

    .item:hover {
      border-left-color: #b4befe;
    }

    .item-title {
      color: #cdd6f4;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .item-role {
      color: #a6adc8;
      font-style: italic;
      font-size: 0.85rem;
      font-weight: 400;
    }

    .item-detail {
      color: #a6adc8;
      font-size: 0.88rem;
      margin-top: 2px;
    }

    .accent {
      color: #b4befe;
    }

    .highlight {
      color: #f9e2af;
    }

    .competition-grid {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .competition-line {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: background 0.2s ease;
    }

    .competition-line:hover {
      background: #1a1a24;
    }

    .competition-year {
      color: #6c7086;
      font-size: 0.8rem;
      font-weight: 500;
      flex-shrink: 0;
      min-width: 38px;
    }

    .competition-name {
      color: #cdd6f4;
      flex: 1;
    }

    .competition-name em {
      color: #a6adc8;
      font-size: 0.82rem;
    }

    .competition-line .result {
      color: #f9e2af;
      font-weight: 600;
      font-size: 0.82rem;
      flex-shrink: 0;
    }

    .competition-line .platform {
      color: #89b4fa;
    }

    .competition-divider {
      height: 1px;
      background: #1a1a24;
      margin: 8px 12px;
    }

    .links-grid {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .link-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: background 0.2s ease;
    }

    .link-row:hover {
      background: #1a1a24;
    }

    .link-label {
      color: #6c7086;
      font-weight: 500;
      min-width: 90px;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .link-row a {
      color: #89b4fa;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .link-row a:hover {
      color: #b4befe;
    }

    .link-arrow {
      color: #1e1e28;
      margin-left: auto;
      font-size: 0.8rem;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .link-row:hover .link-arrow {
      color: #89b4fa;
      transform: translateX(2px);
    }

    strong {
      color: #cdd6f4;
      font-weight: 600;
    }

    em {
      color: #a6adc8;
      font-style: italic;
    }

    @media (max-width: 600px) {
      main {
        padding: 56px 20px 80px;
      }

      header {
        grid-template-columns: minmax(0, 1fr);
        margin-bottom: 60px;
        gap: 20px;
      }

      header h1 {
        font-size: 1.55rem;
      }

      header p {
        max-width: none;
      }

      header .fortune {
        width: 100%;
        padding-right: 50px;
      }

      section {
        margin-bottom: 44px;
      }

      .competition-line {
        flex-wrap: wrap;
      }

      .link-label {
        min-width: 72px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      section {
        animation: none;
      }

      .link-arrow,
      .link-row a,
      .item,
      .competition-line,
      .fortune-refresh {
        transition: none;
      }
    }

    a:focus-visible,
    .link-row a:focus-visible,
    .fortune-refresh:focus-visible {
      outline: 2px solid #b4befe;
      outline-offset: 2px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <main id="app"></main>
  <script>
    fetch('data.json')
      .then(r => r.json())
      .then(render)
      .catch(err => {
        document.getElementById('app').innerHTML = '<p style="color:#ff6b6b;">Failed to load site data.</p>';
        console.error(err);
      });

    function render(data) {
      const app = document.getElementById('app');
      document.title = data.name;

      let html = '';

      html += `<header>
        <div class="title">
          <h1>${esc(data.name)}</h1>
          <p>${esc(data.tagline)}</p>
        </div>
        <div class="fortune loading"><button type="button" class="fortune-refresh" aria-label="Reload cowsay box" title="Reload cowsay box"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path fill="currentColor" d="M12 5a7 7 0 0 1 6.2 3.75V6.5a1 1 0 1 1 2 0V12h-5.5a1 1 0 1 1 0-2h2.28A5 5 0 1 0 17 15a1 1 0 1 1 2 0 7 7 0 1 1-7-10Z" /></svg></button><span class="fortune-content">Loading fortune...</span></div>
      </header>`;

      if (data.about && data.about.length) {
        html += `<section><h2>About</h2>`;
        data.about.forEach(p => { html += `<p>${p}</p>`; });
        html += `</section>`;
      }

      if (data.currently && data.currently.length) {
        html += `<section><h2>Currently</h2><ul>`;
        data.currently.forEach(item => { html += `<li>${item}</li>`; });
        html += `</ul></section>`;
      }

      if (data.work && data.work.length) {
        html += `<section><h2>Work</h2>`;
        data.work.forEach(w => {
          html += `<div class="item">`;
          html += `<div class="item-title">${esc(w.title)}`;
          if (w.role) html += ` <span class="item-role">(${esc(w.role)})</span>`;
          html += `</div>`;
          w.details.forEach(d => { html += `<div class="item-detail">${d}</div>`; });
          html += `</div>`;
        });
        html += `</section>`;
      }

      if (data.experience && data.experience.length) {
        html += `<section><h2>Experience</h2>`;
        data.experience.forEach(e => {
          html += `<div class="item">`;
          html += `<div class="item-title">${esc(e.title)}`;
          if (e.organization) html += ` <span class="item-role">— ${esc(e.organization)}</span>`;
          html += `</div>`;
          e.details.forEach(d => { html += `<div class="item-detail">${d}</div>`; });
          html += `</div>`;
        });
        html += `</section>`;
      }

      if (data.competitions) {
        html += `<section><h2>Competitions</h2><div class="competition-grid">`;
        if (data.competitions.results) {
          data.competitions.results.forEach(c => {
            html += `<div class="competition-line">`;
            html += `<span class="competition-year">${esc(c.year || '')}</span>`;
            html += `<span class="competition-name">${esc(c.name)}`;
            if (c.note) html += ` <em>(${esc(c.note)})</em>`;
            html += `</span>`;
            html += `<span class="result">${esc(c.result)}</span>`;
            html += `</div>`;
          });
        }
        if (data.competitions.ratings && data.competitions.ratings.length) {
          html += `<div class="competition-divider"></div>`;
          data.competitions.ratings.forEach(r => {
            html += `<div class="competition-line">`;
            html += `<span class="competition-year"></span>`;
            html += `<span class="competition-name"><span class="platform">${esc(r.platform)}</span></span>`;
            html += `<span class="result">${esc(r.result)}</span>`;
            html += `</div>`;
          });
        }
        html += `</div></section>`;
      }

      if (data.links && data.links.length) {
        html += `<section><h2>Links</h2><div class="links-grid">`;
        data.links.forEach(l => {
          html += `<div class="link-row">`;
          html += `<span class="link-label">${esc(l.label)}</span>`;
          html += `<a href="${esc(l.url)}">${esc(l.text)}</a>`;
          html += `<span class="link-arrow">\u2192</span>`;
          html += `</div>`;
        });
        html += `</div></section>`;
      }

      app.innerHTML = html;
      const refreshButton = document.querySelector('.fortune-refresh');
      if (refreshButton) refreshButton.addEventListener('click', loadFortune);
      loadFortune();
    }

    function loadFortune() {
      const fortuneEl = document.querySelector('.fortune');
      const fortuneContentEl = document.querySelector('.fortune-content');
      const refreshButton = document.querySelector('.fortune-refresh');
      if (!fortuneEl || !fortuneContentEl) return;

      fortuneContentEl.textContent = 'Loading fortune...';
      fortuneEl.classList.add('loading');
      if (refreshButton) refreshButton.disabled = true;

      fetch('/api/fortune')
        .then(r => r.json())
        .then(data => {
          fortuneContentEl.textContent = data.fortune;
          fortuneEl.classList.remove('loading');
        })
        .catch(err => {
          fortuneContentEl.textContent = 'Fortune unavailable';
          fortuneEl.classList.remove('loading');
          console.error(err);
        })
        .finally(() => {
          if (refreshButton) refreshButton.disabled = false;
        });
    }

    function esc(str) {
      if (!str) return '';
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }
  </script>
</body>
</html>

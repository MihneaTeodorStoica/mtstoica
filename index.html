<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mihnea-Teodor Stoica</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>M</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #09090f;
      color: #bdbdc8;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::selection {
      background: rgba(139, 156, 244, 0.2);
      color: #eeeef5;
    }

    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 96px 24px 140px;
    }

    header {
      margin-bottom: 80px;
    }

    header h1 {
      color: #eeeef5;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
    }

    header p {
      color: #7a7a8a;
      font-size: 0.9rem;
      letter-spacing: 0.01em;
    }

    section {
      margin-bottom: 56px;
      animation: fadeUp 0.5s ease both;
    }

    section:nth-child(2) { animation-delay: 0.05s; }
    section:nth-child(3) { animation-delay: 0.1s; }
    section:nth-child(4) { animation-delay: 0.15s; }
    section:nth-child(5) { animation-delay: 0.2s; }
    section:nth-child(6) { animation-delay: 0.25s; }
    section:nth-child(7) { animation-delay: 0.3s; }
    section:nth-child(8) { animation-delay: 0.35s; }
    section:nth-child(9) { animation-delay: 0.4s; }
    section:nth-child(10) { animation-delay: 0.45s; }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    section h2 {
      color: #6a6a7e;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #1c1c2a;
    }

    section p {
      margin-bottom: 10px;
    }

    section ul {
      list-style: none;
      padding: 0;
    }

    section ul li {
      padding-left: 20px;
      position: relative;
      margin-bottom: 8px;
    }

    section ul li::before {
      content: "";
      position: absolute;
      left: 2px;
      top: 11px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #3a3a52;
    }

    .item {
      margin-bottom: 28px;
      padding-left: 14px;
      border-left: 2px solid #1c1c2a;
      transition: border-color 0.3s ease;
    }

    .item:hover {
      border-left-color: #8b9cf4;
    }

    .item-title {
      color: #dddde8;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .item-role {
      color: #7a7a8a;
      font-style: italic;
      font-size: 0.85rem;
      font-weight: 400;
    }

    .item-detail {
      color: #8a8a9a;
      font-size: 0.88rem;
      margin-top: 2px;
    }

    .accent {
      color: #8b9cf4;
    }

    .highlight {
      color: #e8a04a;
    }

    .competition-grid {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .competition-line {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: background 0.2s ease;
    }

    .competition-line:hover {
      background: #111120;
    }

    .competition-year {
      color: #5a5a72;
      font-size: 0.8rem;
      font-weight: 500;
      flex-shrink: 0;
      min-width: 38px;
    }

    .competition-name {
      color: #bdbdc8;
      flex: 1;
    }

    .competition-name em {
      color: #7a7a8a;
      font-size: 0.82rem;
    }

    .competition-line .result {
      color: #e8a04a;
      font-weight: 600;
      font-size: 0.82rem;
      flex-shrink: 0;
    }

    .competition-line .platform {
      color: #8b9cf4;
    }

    .competition-divider {
      height: 1px;
      background: #14141e;
      margin: 8px 12px;
    }

    .links-grid {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .link-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: background 0.2s ease;
    }

    .link-row:hover {
      background: #111120;
    }

    .link-label {
      color: #6a6a7e;
      font-weight: 500;
      min-width: 90px;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .link-row a {
      color: #8b9cf4;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .link-row a:hover {
      color: #b0bcf8;
    }

    .link-arrow {
      color: #2a2a3a;
      margin-left: auto;
      font-size: 0.8rem;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .link-row:hover .link-arrow {
      color: #8b9cf4;
      transform: translateX(2px);
    }

    strong {
      color: #dddde8;
      font-weight: 600;
    }

    em {
      color: #7a7a8a;
      font-style: italic;
    }

    @media (max-width: 600px) {
      main {
        padding: 56px 20px 80px;
      }

      header {
        margin-bottom: 60px;
      }

      header h1 {
        font-size: 1.45rem;
      }

      section {
        margin-bottom: 44px;
      }

      .competition-line {
        flex-wrap: wrap;
      }

      .link-label {
        min-width: 72px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      section {
        animation: none;
      }

      .link-arrow,
      .link-row a,
      .item,
      .competition-line {
        transition: none;
      }
    }

    a:focus-visible,
    .link-row a:focus-visible {
      outline: 2px solid #8b9cf4;
      outline-offset: 2px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <main id="app"></main>
  <script>
    fetch('data.json')
      .then(r => r.json())
      .then(render)
      .catch(err => {
        document.getElementById('app').innerHTML = '<p style="color:#ff6b6b;">Failed to load site data.</p>';
        console.error(err);
      });

    function render(data) {
      const app = document.getElementById('app');
      document.title = data.name;

      let html = '';

      html += `<header>
        <h1>${esc(data.name)}</h1>
        <p>${esc(data.tagline)}</p>
      </header>`;

      if (data.about && data.about.length) {
        html += `<section><h2>About</h2>`;
        data.about.forEach(p => { html += `<p>${p}</p>`; });
        html += `</section>`;
      }

      if (data.currently && data.currently.length) {
        html += `<section><h2>Currently</h2><ul>`;
        data.currently.forEach(item => { html += `<li>${item}</li>`; });
        html += `</ul></section>`;
      }

      if (data.work && data.work.length) {
        html += `<section><h2>Work</h2>`;
        data.work.forEach(w => {
          html += `<div class="item">`;
          html += `<div class="item-title">${esc(w.title)}`;
          if (w.role) html += ` <span class="item-role">(${esc(w.role)})</span>`;
          html += `</div>`;
          w.details.forEach(d => { html += `<div class="item-detail">${d}</div>`; });
          html += `</div>`;
        });
        html += `</section>`;
      }

      if (data.experience && data.experience.length) {
        html += `<section><h2>Experience</h2>`;
        data.experience.forEach(e => {
          html += `<div class="item">`;
          html += `<div class="item-title">${esc(e.title)}`;
          if (e.organization) html += ` <span class="item-role">— ${esc(e.organization)}</span>`;
          html += `</div>`;
          e.details.forEach(d => { html += `<div class="item-detail">${d}</div>`; });
          html += `</div>`;
        });
        html += `</section>`;
      }

      if (data.competitions) {
        html += `<section><h2>Competitions</h2><div class="competition-grid">`;
        if (data.competitions.results) {
          data.competitions.results.forEach(c => {
            html += `<div class="competition-line">`;
            html += `<span class="competition-year">${esc(c.year || '')}</span>`;
            html += `<span class="competition-name">${esc(c.name)}`;
            if (c.note) html += ` <em>(${esc(c.note)})</em>`;
            html += `</span>`;
            html += `<span class="result">${esc(c.result)}</span>`;
            html += `</div>`;
          });
        }
        if (data.competitions.ratings && data.competitions.ratings.length) {
          html += `<div class="competition-divider"></div>`;
          data.competitions.ratings.forEach(r => {
            html += `<div class="competition-line">`;
            html += `<span class="competition-year"></span>`;
            html += `<span class="competition-name"><span class="platform">${esc(r.platform)}</span></span>`;
            html += `<span class="result">${esc(r.result)}</span>`;
            html += `</div>`;
          });
        }
        html += `</div></section>`;
      }

      if (data.links && data.links.length) {
        html += `<section><h2>Links</h2><div class="links-grid">`;
        data.links.forEach(l => {
          html += `<div class="link-row">`;
          html += `<span class="link-label">${esc(l.label)}</span>`;
          html += `<a href="${esc(l.url)}">${esc(l.text)}</a>`;
          html += `<span class="link-arrow">\u2192</span>`;
          html += `</div>`;
        });
        html += `</div></section>`;
      }

      app.innerHTML = html;
    }

    function esc(str) {
      if (!str) return '';
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }
  </script>
</body>
</html>
